name: 编译 Simple 原生库

on:
  push:
    tags:
      - Nv*
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG_NAME: simple-native ${{ github.ref_name }}
  SNAPSHOT: ${{ !startsWith(github.ref, 'refs/tags/Nv') }}

jobs:
  Windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: '安装 CMake'
        uses: lukka/get-cmake@v3.31.6

      - name: '获取 simple/vcpkg 的 commit id'
        id: vcpkg_commit
        run: |
          cd simple
          COMMIT_ID=$(git ls-tree HEAD vcpkg | awk '{print $3}')
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT
          echo "vcpkg commit id: $COMMIT_ID"
        shell: bash

      - name: '安装并配置 vcpkg'
        uses: lukka/run-vcpkg@v10
        with:
          vcpkgDirectory: simple/vcpkg
          vcpkgGitCommitId: ${{ steps.vcpkg_commit.outputs.commit_id }}
      - run: |
          echo "RUNVCPKG_NO_CACHE=1" >> $GITHUB_ENV
        if: ${{ failure() || cancelled() }}
        shell: bash

      - name: '复制 CMakePresets.json'
        run: |
          Copy-Item "simple/CMakePresets.json" "CMakePresets.json"
          $content = Get-Content "CMakePresets.json" -Raw
          $content = $content -replace '\$\{sourceDir\}/vcpkg/scripts/buildsystems/vcpkg\.cmake', '${sourceDir}/simple/vcpkg/scripts/buildsystems/vcpkg.cmake'
          Set-Content "CMakePresets.json" -Value $content -NoNewline
        shell: pwsh

      - name: '通过 CMake 编译'
        uses: lukka/run-cmake@v10
        continue-on-error: false
        with:
          configurePreset: 'windows-msvc-vs17'
          buildPreset: 'windows-msvc-vs17-release'

      - name: '重命名编译产物'
        run: |
          Copy-Item "../../_temp/windows/simple/src/release/simple.dll" simple.dll
        shell: pwsh

      - name: '上传 Windows 产物'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: simple.dll


  MacOS-iOS:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: '[MacOS] 安装 CMake'
        uses: lukka/get-cmake@v3.31.6

      - name: '[MacOS] 获取 simple/vcpkg 的 commit id'
        id: vcpkg_commit
        run: |
          cd simple
          COMMIT_ID=$(git ls-tree HEAD vcpkg | awk '{print $3}')
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT
          echo "vcpkg commit id: $COMMIT_ID"
        shell: bash

      - name: '[MacOS] 安装并配置 vcpkg'
        uses: lukka/run-vcpkg@v10
        with:
          vcpkgDirectory: simple/vcpkg
          vcpkgGitCommitId: ${{ steps.vcpkg_commit.outputs.commit_id }}
      - run: |
          echo "RUNVCPKG_NO_CACHE=1" >> $GITHUB_ENV
        if: ${{ failure() || cancelled() }}
        shell: bash

      - name: '[MacOS] 复制 CMakePresets.json'
        run: |
          cp "simple/CMakePresets.json" "CMakePresets.json"
          sed -i '' 's|${sourceDir}/vcpkg/scripts/buildsystems/vcpkg.cmake|${sourceDir}/simple/vcpkg/scripts/buildsystems/vcpkg.cmake|g' "CMakePresets.json"
        shell: bash

      - name: '[MacOS] 通过 CMake 编译'
        uses: lukka/run-cmake@v10
        continue-on-error: false
        with:
          configurePreset: 'macos-ninja'
          buildPreset: 'macos-ninja-release'

      - name: '[MacOS] 重命名编译产物'
        run: cp ../../_temp/macos/simple/src/libsimple.dylib libsimple.dylib

      - name: '[iOS] 执行脚本，通过 CMake 编译'
        run: |
          ./build-ios.sh
          cp out/bin/libsimple.a libsimple.a
        env:
          IOS_SIMULATOR: false

      - name: '[iOS Simulator] 执行脚本，通过 CMake 编译'
        run: |
          ./build-ios.sh
          cp out-simulator/bin/libsimple.a libsimple-simulator.a
        env:
          IOS_SIMULATOR: true

      - name: '上传 MacOS/iOS 产物'
        uses: actions/upload-artifact@v4
        with:
          name: macos-ios
          path: |
            libsimple.dylib
            libsimple.a
            libsimple-simulator.a


  Android:
    runs-on: ubuntu-latest
    environment: simple-native-android

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: '设置 Android 环境'
        uses: android-actions/setup-android@v3

      - name: '通过 Gradle 编译'
        run: ./gradlew publishToMavenCentral --info
        working-directory: src/android
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralPassword }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKeyId }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKeyPassword }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKey }}
          ENABLE_TEST: false

      - name: '解压 aar 提取 so 库'
        run: |
          unzip -q src/android/simple-native-android/build/outputs/aar/simple-native-android-release.aar -d temp_aar
        shell: bash

      - name: '上传 Android 产物'
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: temp_aar/jni/


  HarmonyOS:
    runs-on: ubuntu-latest
    environment: simple-native-ohos

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: '设置 HarmonyOS 环境'
        uses: ErBWs/setup-ohos@v1
        with:
          version: 6.0.0.858
          cache: true

      - name: '通过 Hvigor 编译'
        run: hvigorw --mode module -p product=default -p module=simple_native_ohos@default -p buildMode=release assembleHar --analyze=normal --parallel --incremental --daemon
        working-directory: src/ohos

      - name: '安装 expect'
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: '发布至 OpenHarmony 三方库'
        if: env.SNAPSHOT == 'false'
        run: src/ohos/publish.exp
        env:
          OHPM_PASSPHRASE: ${{ secrets.OHPM_PASSPHRASE }}
          OHPM_PUBLISH_ID: ${{ secrets.OHPM_PUBLISH_ID }}
          OHPM_KEY: ${{ secrets.OHPM_KEY }}

      - name: '解压 har 提取 so 库'
        run: |
          mkdir -p temp_har
          tar -xvf src/ohos/simple_native_ohos/build/default/outputs/default/simple_native_ohos.har -C temp_har

      - name: '上传 HarmonyOS 产物'
        uses: actions/upload-artifact@v4
        with:
          name: ohos
          path: temp_har/package/libs/


  Package:
    runs-on: ubuntu-latest
    needs: [Windows, MacOS-iOS, Android, HarmonyOS]
    steps:
      - name: '下载所有产物'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: '整理并打包'
        run: |
          mkdir -p dist/{windows,macos,ios,android,ohos}
          mkdir -p upload
          
          # Windows
          cp artifacts/windows/simple.dll dist/windows/simple.dll
          cp artifacts/windows/simple.dll upload/simple-windows-x64.dll

          # MacOS
          cp artifacts/macos-ios/libsimple.dylib dist/macos/libsimple.dylib
          cp artifacts/macos-ios/libsimple.dylib upload/libsimple-macos-universal.dylib

          # iOS
          cp artifacts/macos-ios/libsimple.a dist/ios/libsimple.a
          cp artifacts/macos-ios/libsimple-simulator.a dist/ios/libsimple-simulator.a
          cp artifacts/macos-ios/libsimple.a upload/libsimple-ios-arm64.a
          cp artifacts/macos-ios/libsimple-simulator.a upload/libsimple-ios-simulator-universal.a
          
          # Android
          cp -r artifacts/android/* dist/android/
          for arch in armeabi-v7a arm64-v8a x86 x86_64; do
            if [ -f artifacts/android/$arch/libsimple.so ]; then
              cp artifacts/android/$arch/libsimple.so upload/libsimple-android-$arch.so
            fi
          done
          
          # HarmonyOS
          cp -r artifacts/ohos/* dist/ohos/
          for arch in arm64-v8a x86_64; do
            if [ -f artifacts/ohos/$arch/libsimple.so ]; then
              cp artifacts/ohos/$arch/libsimple.so upload/libsimple-ohos-$arch.so
            fi
          done
          
          cd dist && zip -r ../libsimple.zip .
        shell: bash

      - name: '提取 CHANGELOG 对应版本内容'
        id: changelog
        run: |
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          python .github/scripts/extract_changelog.py "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: '上传最终产物到 Release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: true
          body: ${{ steps.changelog.outputs.release_notes }}
          files: |
            libsimple.zip
            upload/*

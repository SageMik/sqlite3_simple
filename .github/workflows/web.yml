name: 部署示例至 GitHub Pages

on:
  push:
    branches:
      - web
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-example-web:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 配置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.6'

      - name: 编译
        run: |
          cd example
          flutter pub get
          flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

      - name: 部署至 Github Pages
        id: deployment
        uses: actions/deploy-pages@v4

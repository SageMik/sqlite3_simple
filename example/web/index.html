<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sqlite3_simple_example">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>sqlite3_simple_example</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      inset: 0; overflow: hidden; margin: 0; padding: 0; position: fixed;
      background-color: #fef7ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .flutter-loader {
      display: none !important;
    }
    #loading-indicator {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; width: 100vw;
      transition:
        opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.8s cubic-bezier(0.4, 0, 0.2, 1),
        filter 0.8s ease-out;
    }
    .loader {
      display: flex; align-items: flex-end; justify-content: center;
      width: 124px; height: 24px; gap: 8px;
    }
    .bar {
      width: 8px; height: 12px; background-color: #6750A4;
      border-radius: 4px; animation: wave 1.2s ease-in-out infinite;
    }
    .bar:nth-child(2) { animation-delay: 0.1s; opacity: 0.9; }
    .bar:nth-child(3) { animation-delay: 0.2s; opacity: 0.8; }
    .bar:nth-child(4) { animation-delay: 0.3s; opacity: 0.7; }
    .bar:nth-child(5) { animation-delay: 0.4s; opacity: 0.6; }
    .bar:nth-child(6) { animation-delay: 0.5s; opacity: 0.5; }
    .bar:nth-child(7) { animation-delay: 0.6s; opacity: 0.4; }
    .bar:nth-child(8) { animation-delay: 0.7s; opacity: 0.3; }

    @keyframes wave {
      0%, 100% { height: 15px; transform: translateY(0); }
      50% { height: 60px; transform: translateY(0); }
    }

    .loading-text {
      margin-top: 24px; font-size: 16px; font-weight: 600; color: #6750A4;
      letter-spacing: 4px; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="loader">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="loading-text">Simple sqlite3</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
